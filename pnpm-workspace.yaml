packages:
  - apps/*
  - packages/*

catalog:
  "@typescript/native-preview": 7.0.0-dev.20260519.1
  typescript: 6.0.3
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@^0.1.20

onlyBuiltDependencies:
  - core-js
  - es5-ext
  - esbuild
  - futurescript
  - protobufjs
  - sharp
  - workerd

overrides:
  vite: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
